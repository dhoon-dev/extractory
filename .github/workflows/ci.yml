name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and unit tests
    runs-on: ubuntu-latest
    env:
      UV_LINK_MODE: copy
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --all-extras --group docs

      - name: Validate commit messages
        run: uv run --locked python scripts/check_commit_messages.py --github-event

      - name: Check formatting
        run: uv run --locked ruff format --check .

      - name: Lint
        run: uv run --locked ruff check .

      - name: Type check
        run: uv run --locked ty check

      - name: Run unit tests
        run: uv run --locked pytest -m "not live"

      - name: Build documentation
        run: uv run --locked --group docs sphinx-build -W -b html docs docs/_build/html

      - name: Build package
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: dist/

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-html
          path: docs/_build/html/
